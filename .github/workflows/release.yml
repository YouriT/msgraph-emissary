name: Release

# Publishes prebuilt, single-file binaries so users can grab `emissary`
# straight from a GitHub Release instead of cloning + building from source.
# Triggered by pushing a tag like `v0.1.0`, or manually via workflow_dispatch.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            name: emissary-darwin-arm64
          - target: bun-darwin-x64
            name: emissary-darwin-x64
          - target: bun-linux-x64
            name: emissary-linux-x64
          - target: bun-linux-arm64
            name: emissary-linux-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test
      # Bun's --compile fetches a prebuilt runtime blob per target, so any
      # host can cross-compile for any target — no macOS runner needed.
      - run: |
          mkdir -p dist
          bun build --compile --minify --target=${{ matrix.target }} \
            --outfile dist/${{ matrix.name }} src/index.ts
      - name: Smoke test (native target only)
        if: matrix.target == 'bun-linux-x64'
        run: |
          chmod +x dist/${{ matrix.name }}
          ./dist/${{ matrix.name }} help
      - run: (cd dist && sha256sum ${{ matrix.name }} > ${{ matrix.name }}.sha256)
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            dist/${{ matrix.name }}
            dist/${{ matrix.name }}.sha256

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p out
          find artifacts -type f -exec cp {} out/ \;
          ls -la out
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" out/* \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
